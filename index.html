<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Närvaro – Logga in</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --card: #181c27;
      --border: #2a2f3f;
      --accent: #4f8ef7;
      --accent-hover: #6ba3ff;
      --text: #e8eaf0;
      --muted: #6b7280;
      --error: #f87171;
      --success: #34d399;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.35;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -40%;
      left: -20%;
      width: 70%;
      height: 80%;
      background: radial-gradient(ellipse, rgba(79,142,247,0.12) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: var(--text);
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--accent);
    }

    .btn {
      width: 100%;
      margin-top: 24px;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:hover  { background: var(--accent-hover); }
    .btn:active { transform: scale(0.98); }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-msg {
      margin-top: 16px;
      padding: 10px 14px;
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 8px;
      color: var(--error);
      font-size: 13px;
      display: none;
    }

    .error-msg.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">📋</div>
      <span class="logo-text">NÄRVARO</span>
    </div>

    <h1>Logga in</h1>
    <p class="subtitle">Endast behörig personal</p>

    <div class="field">
      <label for="username">Användarnamn</label>
      <input type="text" id="username" placeholder="anna.svensson" autocomplete="username"/>
    </div>

    <div class="field">
      <label for="password">Lösenord</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <button class="btn" id="loginBtn" onclick="handleLogin()">Logga in</button>

    <div class="error-msg" id="errorMsg"></div>
  </div>

  <script>
    // Simpel hårdkodad autentisering – byt ut mot riktig backend-autentisering senare
    const USERS = {
      'anna.svensson': 'lösenord123',
      'admin': 'admin123'
    }

    // Enter-tangenten triggar login
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin()
    })

    function handleLogin() {
      const username = document.getElementById('username').value.trim()
      const password = document.getElementById('password').value
      const btn = document.getElementById('loginBtn')
      const errorMsg = document.getElementById('errorMsg')

      errorMsg.classList.remove('show')

      if (!username || !password) {
        showError('Fyll i användarnamn och lösenord.')
        return
      }

      btn.disabled = true
      btn.textContent = 'Loggar in...'

      // Simulera en liten fördröjning
      setTimeout(() => {
        if (USERS[username] && USERS[username] === password) {
          sessionStorage.setItem('loggedIn', 'true')
          sessionStorage.setItem('username', username)
          window.location.href = 'frontend/dashboard.html'
        } else {
          showError('Fel användarnamn eller lösenord.')
          btn.disabled = false
          btn.textContent = 'Logga in'
        }
      }, 600)
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg')
      el.textContent = msg
      el.classList.add('show')
    }
  </script>
</body>
</html>
