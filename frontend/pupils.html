<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Närvaro – Elever</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --card: #181c27;
      --border: #2a2f3f;
      --accent: #4f8ef7;
      --text: #e8eaf0;
      --muted: #6b7280;
      --absent: #f87171;
      --present: #34d399;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.2;
      z-index: 0;
      pointer-events: none;
    }

    nav {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      background: rgba(15,17,23,0.85);
      backdrop-filter: blur(10px);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      letter-spacing: 0.05em;
    }

    .nav-logo span { font-size: 20px; }
    .nav-links { display: flex; gap: 8px; }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 7px 14px;
      border-radius: 7px;
      transition: all 0.2s;
    }

    .nav-links a:hover  { color: var(--text); background: var(--border); }
    .nav-links a.active { color: var(--accent); background: rgba(79,142,247,0.1); }

    .nav-right { display: flex; align-items: center; gap: 12px; }

    .nav-user {
      font-size: 13px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover { border-color: var(--absent); color: var(--absent); }

    main {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .page-header h1 { font-size: 28px; font-weight: 700; }
    .page-header p  { color: var(--muted); font-size: 14px; margin-top: 4px; }

    .btn-add {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-add:hover { opacity: 0.9; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
      transform: translateY(16px);
      transition: transform 0.2s;
    }

    .modal-overlay.show .modal { transform: translateY(0); }

    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 24px; }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: var(--accent); }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    .btn-cancel {
      flex: 1;
      padding: 11px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-cancel:hover { border-color: var(--text); color: var(--text); }

    .btn-submit {
      flex: 1;
      padding: 11px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-submit:hover { opacity: 0.9; }

    /* Tabell */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-header span {
      font-size: 13px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    table { width: 100%; border-collapse: collapse; }

    thead { background: rgba(42,47,63,0.5); }

    th {
      text-align: left;
      padding: 12px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    td {
      padding: 14px 16px;
      font-size: 14px;
      border-top: 1px solid var(--border);
    }

    tr:hover td { background: rgba(255,255,255,0.02); }

    .class-badge {
      display: inline-block;
      background: rgba(79,142,247,0.12);
      color: var(--accent);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
    }

    .btn-delete {
      background: transparent;
      border: 1px solid transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-delete:hover { border-color: var(--absent); color: var(--absent); }

    .loading, .empty {
      text-align: center;
      color: var(--muted);
      padding: 60px;
      font-size: 14px;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--card);
      border: 1px solid var(--present);
      color: var(--present);
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      z-index: 200;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
    }

    .toast.show { transform: translateY(0); opacity: 1; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo"><span>📋</span> NÄRVARO</div>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="attendance.html">Närvaro</a>
      <a href="pupils.html" class="active">Elever</a>
    </div>
    <div class="nav-right">
      <span class="nav-user" id="navUser"></span>
      <button class="btn-logout" onclick="logout()">Logga ut</button>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <div>
        <h1>Elever</h1>
        <p>Hantera elever i systemet</p>
      </div>
      <button class="btn-add" onclick="openModal()">+ Lägg till elev</button>
    </div>

    <div class="card">
      <div class="card-header">
        <span id="pupilCount">Laddar...</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Namn</th>
            <th>Klass</th>
            <th>Tillagd</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="pupilsTable">
          <tr><td colspan="4" class="loading">Laddar elever...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2>Lägg till elev</h2>
      <div class="field">
        <label>Fullständigt namn</label>
        <input type="text" id="inputName" placeholder="Ex. Anna Andersson"/>
      </div>
      <div class="field">
        <label>Klass</label>
        <input type="text" id="inputClass" placeholder="Ex. 9A"/>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Avbryt</button>
        <button class="btn-submit" onclick="addPupil()">Lägg till</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { getPupils, addPupil as apiAddPupil, deletePupil as apiDeletePupil } from './api.js'

    if (!sessionStorage.getItem('loggedIn')) {
      window.location.href = '../index.html'
    }

    document.getElementById('navUser').textContent = sessionStorage.getItem('username') || ''

    let pupils = []

    async function loadPupils() {
      try {
        pupils = await getPupils()
        renderTable()
      } catch (err) {
        document.getElementById('pupilsTable').innerHTML =
          '<tr><td colspan="4" class="empty">Kunde inte ladda elever.</td></tr>'
      }
    }

    function renderTable() {
      document.getElementById('pupilCount').textContent = `${pupils.length} elever`

      if (pupils.length === 0) {
        document.getElementById('pupilsTable').innerHTML =
          '<tr><td colspan="4" class="empty">Inga elever tillagda ännu.</td></tr>'
        return
      }

      document.getElementById('pupilsTable').innerHTML = pupils.map(p => {
        const date = new Date(p.created_at).toLocaleDateString('sv-SE')
        return `
          <tr>
            <td><strong>${p.full_name}</strong></td>
            <td><span class="class-badge">${p.class}</span></td>
            <td style="color:var(--muted)">${date}</td>
            <td>
              <button class="btn-delete" onclick="deletePupil('${p.id}', '${p.full_name}')">
                Ta bort
              </button>
            </td>
          </tr>
        `
      }).join('')
    }

    window.openModal = function() {
      document.getElementById('modalOverlay').classList.add('show')
      document.getElementById('inputName').focus()
    }

    window.closeModal = function() {
      document.getElementById('modalOverlay').classList.remove('show')
      document.getElementById('inputName').value = ''
      document.getElementById('inputClass').value = ''
    }

    window.addPupil = async function() {
      const name = document.getElementById('inputName').value.trim()
      const cls  = document.getElementById('inputClass').value.trim()

      if (!name || !cls) {
        alert('Fyll i både namn och klass.')
        return
      }

      try {
        const newPupil = await apiAddPupil(name, cls)
        pupils.push(newPupil)
        renderTable()
        closeModal()
        showToast(`✓ ${name} tillagd!`)
      } catch (err) {
        alert('Kunde inte lägga till elev.')
        console.error(err)
      }
    }

    window.deletePupil = async function(id, name) {
      if (!confirm(`Ta bort ${name}? Detta går inte att ångra.`)) return

      try {
        await apiDeletePupil(id)
        pupils = pupils.filter(p => p.id !== id)
        renderTable()
        showToast(`${name} borttagen.`)
      } catch (err) {
        alert('Kunde inte ta bort elev.')
        console.error(err)
      }
    }

    function showToast(msg) {
      const toast = document.getElementById('toast')
      toast.textContent = msg
      toast.classList.add('show')
      setTimeout(() => toast.classList.remove('show'), 3000)
    }

    window.logout = function() {
      sessionStorage.clear()
      window.location.href = '../index.html'
    }

    // Enter i modal
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && document.getElementById('modalOverlay').classList.contains('show')) {
        window.addPupil()
      }
      if (e.key === 'Escape') window.closeModal()
    })

    loadPupils()
  </script>
</body>
</html>
